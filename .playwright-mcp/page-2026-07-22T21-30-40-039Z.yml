      - paragraph [ref=f1e40]: Hi! Mijn naam is Rosalie Maria van der Sluis, ik ben 18 jaar oud en creativiteit is al sinds ik een klein meisje ben een groot onderdeel van mijn leven.
      - paragraph [ref=f1e41]: Mijn favoriete hobby's zijn tekenen, handletteren en schilderen.
      - paragraph [ref=f1e42]: Door mijn creaties wil ik mensen bemoedigen en een beeld geven van wie God is, vooral door middel van Bijbelteksten, quotes en persoonlijke boodschappen.
      - paragraph [ref=f1e43]: Mijn grootste droom is om mijn eigen kaarten te verkopen voor allerlei gelegenheden, zoals verjaardagen, ziekte, bemoediging of gewoon een lief berichtje voor iemand die het nodig heeft. Elke kaart wordt met veel liefde en aandacht ontworpen.
